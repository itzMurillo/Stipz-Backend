spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/StipzTests6}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.envers.store_data_at_delete=true

stipz.security.admin.nome=${ADMIN_NAME:Administrador}
stipz.security.admin.email=${ADMIN_EMAIL:admin@stipz.com}
stipz.security.admin.senha=${ADMIN_PASSWORD:}

stipz.security.jwt.issuer=stipz-api
stipz.security.jwt.expiracao-segundos=7200
stipz.security.jwt.secret=${JWT_SECRET:}

stipz.backup.auditoria.ativo=true
stipz.backup.auditoria.pasta=backups/auditoria
stipz.backup.auditoria.manter-arquivos=7
stipz.backup.auditoria.pg-dump=${PG_DUMP_PATH:C:/Program Files/PostgreSQL/18/bin/pg_dump.exe}
stipz.backup.auditoria.cron=0 0 2 * * *
